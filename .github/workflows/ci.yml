name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4
          sudo ln -sf /usr/bin/lua5.4 /usr/local/bin/lua

      - name: Run adapter tests
        run: make test

      - name: Build mpackage
        run: make build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geyser-markdown-mpackage
          path: dist/geyser-markdown.mpackage
