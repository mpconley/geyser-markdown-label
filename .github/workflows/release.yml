name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run adapter tests
        run: make test

      - name: Build mpackage
        run: make build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/geyser-markdown.mpackage
