name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4
          sudo ln -sf /usr/bin/lua5.4 /usr/local/bin/lua

      - name: Run adapter tests
        run: make test

      - name: Build mpackage
        run: make build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/geyser-markdown.mpackage
